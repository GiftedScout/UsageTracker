<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UsageTracker - 设置</title>
    <link id="theme-css" rel="stylesheet" href="static/css/fairy-tale.css">
    <style>
        * { transition: background-color 0.3s, color 0.3s, border-color 0.3s; }
        .inline-form { display: flex; gap: 8px; align-items: center; margin: 8px 0; flex-wrap: wrap; }
        .inline-form input, .inline-form select { min-width: 120px; padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg-card); color: var(--text-primary); font-size: 14px; }
        .inline-form input[type="color"] { width: 40px; min-width: 40px; padding: 2px; height: 32px; cursor: pointer; }
        .form-group { margin: 12px 0; }
        .form-group label { display: block; margin-bottom: 4px; font-size: 13px; color: var(--text-secondary); }
        .form-group input { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg-card); color: var(--text-primary); font-size: 14px; }
        .form-group select { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg-card); color: var(--text-primary); font-size: 14px; }
        .btn-row { display: flex; gap: 8px; margin-top: 12px; }
    </style>
</head>
<body>
    <div id="app">
        <!-- 侧边栏 -->
        <aside id="sidebar">
            <div class="sidebar-header">
                <img src="static/assets/icon.ico" alt="icon" class="app-icon">
                <span class="app-title">UsageTracker</span>
            </div>
            <nav id="sidebar-nav">
                <a href="#" class="nav-item active" data-tab="general">
                    <span class="nav-icon">⚙️</span>
                    <span class="nav-label">通用</span>
                </a>
                <a href="#" class="nav-item" data-tab="categories">
                    <span class="nav-icon">📁</span>
                    <span class="nav-label">分类</span>
                </a>
                <a href="#" class="nav-item" data-tab="browsers">
                    <span class="nav-icon">🌐</span>
                    <span class="nav-label">浏览器</span>
                </a>
                <a href="#" class="nav-item" data-tab="games">
                    <span class="nav-icon">🎮</span>
                    <span class="nav-label">游戏</span>
                </a>
                <a href="#" class="nav-item" data-tab="ignore">
                    <span class="nav-icon">🚫</span>
                    <span class="nav-label">忽略</span>
                </a>
                <a href="#" class="nav-item" data-tab="database">
                    <span class="nav-icon">🗄️</span>
                    <span class="nav-label">数据库</span>
                </a>
                <a href="#" class="nav-item" data-tab="feedback">
                    <span class="nav-icon">📝</span>
                    <span class="nav-label">反馈</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <button id="btn-theme-switch" class="btn-icon" title="切换主题">🌸</button>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main id="content">
            <!-- 通用 Tab -->
            <section id="tab-general" class="tab-content active">
                <h2>通用设置</h2>
                <div class="card">
                    <div class="form-row">
                        <label>语言</label>
                        <select id="cfg-language">
                            <option value="zh-CN">简体中文</option>
                            <option value="en">English</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <label>开机自启动</label>
                        <label class="switch">
                            <input type="checkbox" id="cfg-auto-start">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="form-row">
                        <label>自动显示昨日报告</label>
                        <label class="switch">
                            <input type="checkbox" id="cfg-auto-report">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="form-row">
                        <label>检测模式</label>
                        <select id="cfg-detection-mode">
                            <option value="polling">轮询模式</option>
                            <option value="event">事件驱动</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <label>自动检查更新</label>
                        <label class="switch">
                            <input type="checkbox" id="cfg-check-update">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="form-row">
                        <label>网页主题</label>
                        <select id="cfg-web-theme">
                            <option value="fairy">🌸 童话</option>
                            <option value="geek">🖥️ 极客</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" id="btn-save-general">保存设置</button>
                </div>

                <h3>关于</h3>
                <div class="card">
                    <p>UsageTracker <span id="app-version">v0.3.0</span></p>
                    <p>许可：GPL-3.0</p>
                    <button class="btn btn-secondary" id="btn-check-update">检查更新</button>
                </div>
            </section>

            <!-- 分类 Tab -->
            <section id="tab-categories" class="tab-content">
                <h2>应用分类</h2>
                <div class="card">
                    <h3>自定义分类</h3>
                    <div id="custom-categories-list"></div>
                    <div class="inline-form">
                        <input type="text" id="new-category-id" placeholder="分类 ID（如 dev）">
                        <input type="text" id="new-category-name" placeholder="分类名称（如 开发工具）">
                        <input type="color" id="new-category-color" value="#0078D4" title="颜色">
                        <button class="btn btn-primary" id="btn-add-category">添加</button>
                    </div>
                </div>
                <div class="card">
                    <h3>分类中的应用</h3>
                    <select id="category-selector"></select>
                    <div id="category-apps-list" class="app-list"></div>
                    <div class="inline-form">
                        <input type="text" id="new-app-path" placeholder="应用路径（如 C:\app\code.exe）">
                        <button class="btn btn-primary" id="btn-add-app-to-category">添加</button>
                    </div>
                </div>
            </section>

            <!-- 浏览器 Tab -->
            <section id="tab-browsers" class="tab-content">
                <h2>浏览器规则</h2>
                <p class="desc">配置哪些浏览器 URL 对应哪个分类</p>
                <div class="card">
                    <div id="browser-rules-list"></div>
                    <div class="form-group">
                        <label>规则名称</label>
                        <input type="text" id="new-browser-name" placeholder="如 GitHub">
                    </div>
                    <div class="form-group">
                        <label>浏览器可执行文件路径</label>
                        <input type="text" id="new-browser-exe" placeholder="如 C:\app\chrome.exe（留空匹配所有浏览器）">
                    </div>
                    <div class="form-group">
                        <label>URL 匹配模式</label>
                        <input type="text" id="new-browser-url" placeholder="如 github.com（留空匹配所有 URL）">
                    </div>
                    <button class="btn btn-primary" id="btn-add-browser-rule">添加规则</button>
                </div>
            </section>

            <!-- 游戏 Tab -->
            <section id="tab-games" class="tab-content">
                <h2>游戏目录</h2>
                <p class="desc">配置游戏可执行文件所在目录</p>
                <div class="card">
                    <div id="game-dirs-list"></div>
                    <div class="inline-form">
                        <input type="text" id="new-game-dir" placeholder="游戏目录路径（如 D:\Steam\steamapps\common）">
                        <button class="btn btn-primary" id="btn-add-game-dir">添加</button>
                    </div>
                </div>
            </section>

            <!-- 忽略 Tab -->
            <section id="tab-ignore" class="tab-content">
                <h2>忽略列表</h2>
                <p class="desc">被忽略的应用不会计入使用时长</p>
                <div class="card">
                    <div id="ignored-apps-list" class="app-list"></div>
                    <div class="inline-form">
                        <input type="text" id="new-ignore-path" placeholder="应用路径（如 C:\Windows\System32\cmd.exe）">
                        <button class="btn btn-primary" id="btn-add-ignore">添加</button>
                    </div>
                </div>
            </section>

            <!-- 数据库 Tab -->
            <section id="tab-database" class="tab-content">
                <h2>数据库管理</h2>
                <div class="card">
                    <p>数据库大小：<span id="db-size">-</span></p>
                    <p>记录条数：<span id="db-records">-</span></p>
                    <div class="inline-form">
                        <label>清理天数：</label>
                        <input type="number" id="cleanup-days" value="90" min="1" style="width: 80px;">
                        <span>天</span>
                    </div>
                    <div class="btn-row">
                        <button class="btn btn-secondary" id="btn-backup-db">备份数据库</button>
                        <button class="btn btn-warning" id="btn-cleanup-db">清理旧数据</button>
                    </div>
                </div>
            </section>

            <!-- 反馈 Tab -->
            <section id="tab-feedback" class="tab-content">
                <h2>问题反馈</h2>
                <div class="card">
                    <div class="form-row">
                        <label>问题描述</label>
                        <textarea id="feedback-desc" rows="5" placeholder="描述你遇到的问题..."></textarea>
                    </div>
                    <div class="form-row">
                        <label>联系方式（可选）</label>
                        <input type="text" id="feedback-contact" placeholder="邮箱或微信">
                    </div>
                    <button class="btn btn-primary" id="btn-submit-feedback">提交反馈</button>
                </div>
                <div class="card">
                    <h3>崩溃日志</h3>
                    <div id="crash-logs-list"></div>
                </div>
            </section>
        </main>
    </div>

    <!-- Toast 通知 -->
    <div id="toast" class="toast hidden"></div>

    <script src="static/js/app.js"></script>
</body>
</html>
